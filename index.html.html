<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPN 電子化處方箋成效評估</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8FAFC; overflow-x: hidden; }
        .animate-fadeIn { animation: fadeIn 0.6s ease-out; }
        .animate-slideIn { animation: slideIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .scale-grid { display: grid; grid-template-cols: repeat(5, 1fr); gap: 0.5rem; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, doc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const startApp = async () => {
            try {
                let config;
                if (typeof __firebase_config !== 'undefined') {
                    config = JSON.parse(__firebase_config);
                } else {
                    // 請在這裡貼上您在 Firebase Console 獲取的 Config
                    config = {
                        apiKey: "AIzaSyAYdu322gIj9_vB7P0wliV2lkq7bWu46oM",
                        authDomain: "tpn-survey.firebaseapp.com",
                        projectId: "tpn-survey",
                        storageBucket: "tpn-survey.firebasestorage.app",
                        messagingSenderId: "890251445944",
                        appId: "1:890251445944:web:81ccfd66f02791776b164d"
                    };
                }

                const app = initializeApp(config);
                const auth = getAuth(app);
                const db = getFirestore(app);
                const appId = 'tpn-survey-app';

                // 嘗試匿名登入
                try {
                    await signInAnonymously(auth);
                } catch (authErr) {
                    console.error("Auth Error:", authErr);
                    if (authErr.code === 'auth/admin-restricted-operation') {
                        window.FirebaseError = "權限受限 (admin-restricted-operation)。請檢查 Google Cloud Console 中的 API Key 是否限制了 Identity Toolkit API。";
                    } else {
                        window.FirebaseError = authErr.message;
                    }
                }

                window.FirebaseService = { auth, db, appId, collection, addDoc, onSnapshot, serverTimestamp, onAuthStateChanged, query };
                window.dispatchEvent(new Event('firebase-ready'));
            } catch (e) {
                window.FirebaseError = e.message;
                window.dispatchEvent(new Event('firebase-error'));
            }
        };
        startApp();
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, className }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [fbStatus, setFbStatus] = useState('loading');
            const [step, setStep] = useState('welcome');
            const [user, setUser] = useState(null);
            const [responses, setResponses] = useState([]);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [isAdminAuthenticated, setIsAdminAuthenticated] = useState(false);
            const [error, setError] = useState('');
            const [formData, setFormData] = useState({ experience: '', before: Array(6).fill(0), after: Array(6).fill(0) });

            const questions = [
                "整理與核對處方箋耗時且繁瑣",
                "處方箋的傳送對工作流程不便",
                "儲存處方箋需要大量實體空間",
                "處方修改需聯絡護理端重印與重送",
                "處方箋的資料回溯查找困難",
                "對 TPN 作業流程的整體滿意度"
            ];

            useEffect(() => {
                const handleReady = () => setFbStatus('ready');
                const handleError = () => { setFbStatus('error'); setError(window.FirebaseError); };
                window.addEventListener('firebase-ready', handleReady);
                window.addEventListener('firebase-error', handleError);
                if (window.FirebaseService) setFbStatus('ready');
                return () => {
                    window.removeEventListener('firebase-ready', handleReady);
                    window.removeEventListener('firebase-error', handleError);
                };
            }, []);

            useEffect(() => {
                if (fbStatus !== 'ready') return;
                return window.FirebaseService.onAuthStateChanged(window.FirebaseService.auth, setUser);
            }, [fbStatus]);

            // 管理員資料讀取邏輯
            useEffect(() => {
                if (fbStatus !== 'ready' || !isAdminAuthenticated || !user) return;
                const { db, appId, collection, onSnapshot } = window.FirebaseService;
                const q = collection(db, 'artifacts', appId, 'public', 'data', 'responses');
                
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    setResponses(snapshot.docs.map(d => ({ id: d.id, ...d.data() })));
                    setError('');
                }, (err) => {
                    setError(`讀取失敗: ${err.message}。這通常是 Firestore Rules 權限不夠。`);
                });
                return () => unsubscribe();
            }, [fbStatus, isAdminAuthenticated, user]);

            const stats = useMemo(() => {
                if (responses.length === 0) return null;
                const count = responses.length;
                const bAvg = Array(6).fill(0), aAvg = Array(6).fill(0);
                responses.forEach(r => {
                    r.before?.forEach((v, i) => bAvg[i] += v);
                    r.after?.forEach((v, i) => aAvg[i] += v);
                });
                return { count, bAvg: bAvg.map(s => s/count), aAvg: aAvg.map(s => s/count) };
            }, [responses]);

            const handleSubmit = async () => {
                if (!user) return alert("登入狀態失效，請重新整理頁面。");
                setIsSubmitting(true);
                const { db, appId, collection, addDoc, serverTimestamp } = window.FirebaseService;
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'responses'), {
                        ...formData,
                        userId: user.uid,
                        createdAt: serverTimestamp(),
                    });
                    setStep('success');
                } catch (err) { alert("提交失敗：" + err.message); }
                finally { setIsSubmitting(false); }
            };

            const exportCSV = () => {
                let csv = "\ufeffID,年資," + questions.map((_, i) => `前Q${i+1},後Q${i+1}`).join(",") + "\n";
                responses.forEach(r => {
                    csv += [r.id, r.experience, ...r.before.flatMap((v,i)=>[v, r.after[i]])].join(",") + "\n";
                });
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = `TPN_Survey_Results.csv`;
                a.click();
            };

            if (fbStatus === 'error' || error) return (
                <div className="flex flex-col items-center justify-center p-8 text-center min-h-screen bg-red-50">
                    <Icon name="alert-triangle" className="w-20 h-20 text-red-500 mb-6" />
                    <h2 className="text-2xl font-black mb-4">系統異常</h2>
                    <div className="bg-white p-6 rounded-3xl border border-red-100 shadow-sm max-w-md w-full mb-8 text-left text-sm">
                        <p className="text-red-600 font-bold mb-4">{error || fbStatus === 'error' ? error || window.FirebaseError : ''}</p>
                        <hr className="my-4" />
                        <p className="font-bold mb-2 underline">請檢查以下設定：</p>
                        <ul className="list-decimal pl-5 space-y-2 text-gray-600">
                            <li><b>API 金鑰限制：</b>前往 Google Cloud Console 檢查該 API Key 是否「限制金鑰」，若是，必須勾選 <b>Identity Toolkit API</b>。</li>
                            <li><b>Firestore 規則：</b>Rules 是否已發布為 <code>allow read, write: if true;</code>。</li>
                            <li><b>匿名登入：</b>確認 Authentication 裡的「匿名」已啟用。</li>
                        </ul>
                    </div>
                    <button onClick={() => window.location.reload()} className="bg-gray-900 text-white px-8 py-3 rounded-2xl font-bold">重新整理頁面</button>
                </div>
            );

            if (fbStatus === 'loading') return <div className="flex items-center justify-center min-h-screen text-blue-600 font-bold animate-pulse">系統連線中...</div>;

            if (step === 'welcome') return (
                <div className="flex flex-col items-center justify-center p-8 text-center min-h-screen max-w-md mx-auto animate-fadeIn">
                    <div className="bg-blue-600 p-6 rounded-[2.5rem] shadow-2xl mb-8 transform hover:scale-105 transition-transform">
                        <Icon name="clipboard-check" className="w-16 h-16 text-white" />
                    </div>
                    <h1 className="text-4xl font-black text-gray-900 mb-4 tracking-tight leading-tight">TPN 電子化處方箋<br/>成效評估</h1>
                    {!user && <p className="text-amber-600 text-xs mb-4 font-bold flex items-center gap-1 justify-center"><Icon name="alert-circle" className="w-3 h-3" /> 警告：未成功登入，將無法儲存資料</p>}
                    <button onClick={() => setStep('basic')} className="w-full bg-blue-600 text-white py-5 rounded-3xl font-bold text-xl shadow-xl shadow-blue-100">開始填答</button>
                    <button onClick={() => {
                        const p = prompt("請輸入管理密碼 (1234)：");
                        if (p === "1234") { setIsAdminAuthenticated(true); setStep('admin'); }
                    }} className="mt-24 text-gray-300 text-xs flex items-center gap-1 hover:text-blue-500 transition-colors"><Icon name="lock" className="w-3 h-3" /> 數據管理後台</button>
                </div>
            );

            if (step === 'basic') return (
                <div className="p-8 animate-slideIn max-w-2xl mx-auto min-h-screen flex flex-col justify-center">
                    <h2 className="text-3xl font-black text-gray-800 mb-10 text-center">您的 TPN 工作年資？</h2>
                    <div className="grid grid-cols-2 gap-4 mb-12">
                        {['未滿1年', '1-5年', '6-15年', '15年以上'].map(opt => (
                            <button key={opt} onClick={() => setFormData({...formData, experience: opt})} className={`p-6 text-center rounded-3xl border-2 font-bold transition-all ${formData.experience === opt ? 'border-blue-600 bg-blue-50 text-blue-700' : 'border-gray-100 bg-white hover:border-blue-100'}`}>
                                {opt}
                            </button>
                        ))}
                    </div>
                    <button disabled={!formData.experience} onClick={() => setStep('before')} className={`w-full py-5 rounded-3xl font-black text-xl shadow-lg transition-all ${formData.experience ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-400'}`}>下一步</button>
                </div>
            );

            if (step === 'before' || step === 'after') {
                const isBefore = step === 'before';
                const cur = isBefore ? formData.before : formData.after;
                return (
                    <div className="p-6 animate-slideIn max-w-4xl mx-auto pb-24">
                        <div className="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
                            <h2 className={`text-xl font-black px-6 py-3 rounded-2xl text-white shadow-md inline-block ${isBefore ? 'bg-amber-500' : 'bg-emerald-600'}`}>
                                {isBefore ? '第一階段：改善前 (紙本)' : '第二階段：改善後 (電子)'}
                            </h2>
                            <div className="text-[10px] font-bold text-gray-400 bg-white p-2 px-4 rounded-lg border border-gray-100">
                                1 非常不同意 | 5 非常同意
                            </div>
                        </div>
                        <div className="space-y-4">
                            {questions.map((q, i) => (
                                <div key={i} className="bg-white p-5 rounded-[2rem] border border-gray-100 shadow-sm flex flex-col md:flex-row md:items-center gap-4 hover:shadow-md transition-shadow">
                                    <div className="flex-grow font-bold text-gray-800 leading-snug"><span className="text-blue-600 mr-2 italic text-sm">Q{i+1}</span>{q}</div>
                                    <div className="flex items-center gap-1 md:w-60">
                                        {[1,2,3,4,5].map(v => (
                                            <button key={v} onClick={() => {
                                                const d = [...cur]; d[i] = v;
                                                setFormData({...formData, [isBefore?'before':'after']: d});
                                            }} className={`flex-1 py-3 rounded-xl font-black text-lg transition-all border-2 ${cur[i] === v ? (isBefore ? 'bg-amber-500 border-amber-500 text-white scale-110 shadow-lg' : 'bg-emerald-600 border-emerald-600 text-white scale-110 shadow-lg') : 'bg-gray-50 border-gray-50 text-gray-300'}`}>{v}</button>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="flex gap-4 mt-10">
                            <button onClick={() => setStep(isBefore ? 'basic' : 'before')} className="flex-1 bg-white border-2 border-gray-100 text-gray-500 py-5 rounded-3xl font-bold">返回</button>
                            <button onClick={isBefore ? () => (cur.some(v=>v===0) ? alert('請完成所有評分題目') : setStep('after')) : handleSubmit} disabled={isSubmitting} className={`flex-[2] py-5 rounded-3xl font-black text-white shadow-xl ${isBefore ? 'bg-amber-600' : 'bg-emerald-600'} ${isSubmitting ? 'opacity-50' : ''}`}>
                                {isSubmitting ? '傳送中...' : isBefore ? '下一步' : '送出問卷'}
                            </button>
                        </div>
                    </div>
                );
            }

            if (step === 'admin') return (
                <div className="p-6 max-w-2xl mx-auto pb-20 animate-fadeIn">
                    <div className="flex items-center justify-between mb-8">
                        <button onClick={() => setStep('welcome')} className="bg-white p-3 rounded-2xl shadow-sm text-gray-400 hover:text-gray-600"><Icon name="chevron-left" className="w-8 h-8" /></button>
                        <h2 className="text-2xl font-black text-gray-800">數據分析中心</h2>
                        <button onClick={exportCSV} className="bg-blue-600 p-3 rounded-2xl shadow-lg text-white hover:bg-blue-700 transition-all"><Icon name="download" className="w-6 h-6" /></button>
                    </div>

                    {stats ? (
                        <div className="space-y-6">
                            <div className="bg-blue-900 text-white p-8 rounded-[2.5rem] shadow-xl text-center">
                                <p className="text-sm font-bold opacity-60 mb-1 tracking-widest uppercase">總填答人數</p>
                                <p className="text-5xl font-black tracking-tighter">{stats.count}</p>
                            </div>
                            <div className="bg-white p-8 rounded-[2.5rem] border border-gray-100 shadow-xl">
                                <h3 className="font-black mb-10 text-gray-800 text-center border-b pb-4 border-dashed">前後平均得分對照</h3>
                                <div className="space-y-8">
                                    {questions.map((q, i) => (
                                        <div key={i} className="space-y-3">
                                            <p className="text-xs font-bold text-gray-700">{i+1}. {q}</p>
                                            <div className="flex flex-col gap-2">
                                                <div className="flex items-center gap-2">
                                                    <div className="flex-grow h-2 bg-gray-50 rounded-full overflow-hidden flex"><div className="bg-amber-400 h-full" style={{width: `${stats.bAvg[i]/5*100}%`}}></div></div>
                                                    <span className="text-[10px] font-bold text-amber-500 w-6">{stats.bAvg[i].toFixed(1)}</span>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <div className="flex-grow h-2 bg-gray-50 rounded-full overflow-hidden flex"><div className="bg-emerald-500 h-full" style={{width: `${stats.aAvg[i]/5*100}%`}}></div></div>
                                                    <span className="text-[10px] font-bold text-emerald-600 w-6">{stats.aAvg[i].toFixed(1)}</span>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    ) : <div className="text-center py-20 text-gray-400 font-bold border-2 border-dashed rounded-3xl">目前資料庫無數據</div>}
                </div>
            );

            if (step === 'success') return (
                <div className="flex flex-col items-center justify-center p-8 text-center min-h-screen animate-fadeIn">
                    <div className="bg-emerald-100 p-8 rounded-[3rem] mb-10 shadow-2xl shadow-emerald-50"><Icon name="check" className="w-20 h-20 text-emerald-600" /></div>
                    <h1 className="text-4xl font-black text-gray-900 mb-6">提交成功！</h1>
                    <button onClick={() => window.location.reload()} className="bg-gray-900 text-white px-12 py-5 rounded-3xl font-bold shadow-xl">回到首頁</button>
                </div>
            );

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
